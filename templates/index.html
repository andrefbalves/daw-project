{% extends "layout.html" %}
{% block content %}
<section class="main-container">
    <div class="login-card">
        <div class="card-header">
            <h2><i class="fa-solid fa-user"></i> Login</h2>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="messages">
                    {% for category, message in messages %}
                        <p class="message {{ category }}">{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form method="post" action="{{ url_for('login') }}">
            <div class="input-group">
                <label for="username">Utilizador</label>
                <input type="text" id="username" name="username" placeholder="Nome de utilizador" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Password" required>
            </div>

            <div class="form-actions">
                <label class="remember-me">
                    <input type="checkbox" name="remember">
                    Lembrar-me
                </label>
                <button class="btn-primary" type="submit">Entrar</button>
            </div>
        </form>

        <div class="forgot-password">
            <a href="#">Esqueci-me da password</a>
        </div>

        <hr class="divider">

        <a class="btn-secondary outline-dark account-link" href="{{ url_for('register') }}">
            <i class="fa-solid fa-user-plus"></i>
            Criar nova conta
        </a>
    </div>
</section>
{% endblock %}
