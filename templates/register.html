{% extends "layout.html" %}

{% block content %}
<section class="main-container">
    <div class="login-card register-card">
        <div class="card-header">
            <h2><i class="fa-solid fa-user-plus"></i> Criar conta</h2>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="messages">
                    {% for category, message in messages %}
                        <p class="message {{ category }}">{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form method="post" action="{{ url_for('register') }}">
            <div class="input-group">
                <label for="full_name">Nome</label>
                <input type="text" id="full_name" name="full_name" placeholder="O teu nome">
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="email@exemplo.pt">
            </div>

            <div class="input-group">
                <label for="username">Utilizador</label>
                <input type="text" id="username" name="username" placeholder="Nome de utilizador" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Password" required>
            </div>

            <div class="input-group">
                <label for="confirm_password">Confirmar password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Repete a password" required>
            </div>

            <label class="remember-me terms">
                <input type="checkbox" name="terms" required>
                Aceito criar uma conta nesta quinta
            </label>

            <div class="register-actions">
                <a class="back-link" href="{{ url_for('home_page') }}">Voltar ao login</a>
                <button class="btn-primary" type="submit">Criar conta</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
